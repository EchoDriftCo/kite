app = 'recipevault-morning-dawn-6796'
primary_region = 'dfw'

[build]
  # Default build args - overridden by CI via --build-arg flags
  [build.args]
    VERSION = "1.0.0-local"
    GIT_SHA = "local"
    BUILD_TIMESTAMP = "1970-01-01T00:00:00Z"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '30s'
    timeout = '5s'
    path = '/api/health'
    grace_period = '30s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
