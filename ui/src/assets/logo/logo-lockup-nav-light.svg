<svg width="280" height="40" viewBox="0 0 280 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&amp;display=swap');
    </style>
  </defs>

  <!-- Icon scaled to 40x40 (scale factor: 40/512 = 0.078125) -->
  <g transform="scale(0.078125)">
    <!-- Recipe card body -->
    <rect x="116" y="76" width="280" height="360" rx="24" fill="#ff8c42"/>
    <!-- Folded corner -->
    <path d="M 396 76 L 396 156 L 316 76 Z" fill="#7c9885"/>
    <!-- Detail lines (recipe text) -->
    <rect x="166" y="216" width="180" height="4" rx="2" fill="#ffffff" opacity="0.4"/>
    <rect x="166" y="248" width="180" height="4" rx="2" fill="#ffffff" opacity="0.4"/>
    <rect x="166" y="280" width="180" height="4" rx="2" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Wordmark: 24px, x=52 (40 icon + 12 gap), vertically centered at y=20 -->
  <text
    x="52"
    y="20"
    font-family="Inter, -apple-system, 'Segoe UI', sans-serif"
    font-weight="600"
    font-size="24"
    letter-spacing="-0.48"
    fill="#1a1a1a"
    dominant-baseline="middle"
  >RecipeVault</text>
</svg>
