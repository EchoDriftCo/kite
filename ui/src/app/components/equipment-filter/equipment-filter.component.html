<div class="equipment-filter">
  <button mat-stroked-button
          (click)="toggleFilter()"
          [class.filter-active]="filterEnabled"
          [matTooltip]="filterEnabled ? 'Showing only recipes you have equipment for' : 'Show all recipes'">
    <mat-icon>{{ filterEnabled ? 'check_circle' : 'kitchen' }}</mat-icon>
    {{ filterEnabled ? 'My Equipment Only' : 'Filter by Equipment' }}
  </button>
</div>
