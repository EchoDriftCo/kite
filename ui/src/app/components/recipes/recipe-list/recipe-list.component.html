<div class="recipe-list-container">
  <div class="header">
    <h1>My Recipes</h1>
    <button mat-raised-button color="primary" routerLink="/recipes/new">
      <mat-icon>add</mat-icon>
      New Recipe
    </button>
  </div>

  <div *ngIf="loading" class="loading">
    <p>Loading recipes...</p>
  </div>

  <div *ngIf="error" class="error">
    <mat-card>
      <mat-card-content>
        {{ error }}
      </mat-card-content>
    </mat-card>
  </div>

  <div class="recipes-grid" *ngIf="!loading && !error">
    <mat-card *ngFor="let recipe of recipes" class="recipe-card">
      <mat-card-header>
        <mat-card-title>{{ recipe.name }}</mat-card-title>
        <mat-card-subtitle *ngIf="recipe.category">{{ recipe.category }}</mat-card-subtitle>
      </mat-card-header>
      
      <img mat-card-image *ngIf="recipe.thumbnailUrl" [src]="recipe.thumbnailUrl" [alt]="recipe.name">
      
      <mat-card-content>
        <p *ngIf="recipe.description">{{ recipe.description }}</p>
        <div class="recipe-meta">
          <span *ngIf="recipe.prepTime"><mat-icon>schedule</mat-icon> {{ recipe.prepTime }}m prep</span>
          <span *ngIf="recipe.cookTime"><mat-icon>restaurant</mat-icon> {{ recipe.cookTime }}m cook</span>
          <span *ngIf="recipe.servings"><mat-icon>people</mat-icon> {{ recipe.servings }} servings</span>
        </div>
      </mat-card-content>
      
      <mat-card-actions>
        <button mat-button [routerLink]="['/recipes', recipe.id]">View</button>
        <button mat-button [routerLink]="['/recipes', recipe.id, 'edit']">Edit</button>
        <button mat-button color="warn" (click)="deleteRecipe(recipe.id)">Delete</button>
      </mat-card-actions>
    </mat-card>

    <div *ngIf="recipes.length === 0" class="no-recipes">
      <p>No recipes yet. Create your first one!</p>
    </div>
  </div>
</div>
