<div class="recipe-form-container">
  <div class="header">
    <h1>{{ isEditMode ? 'Edit Recipe' : 'New Recipe' }}</h1>
  </div>

  <div *ngIf="error" class="error">
    <mat-card>
      <mat-card-content>
        {{ error }}
      </mat-card-content>
    </mat-card>
  </div>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="recipeForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Recipe Name</mat-label>
          <input matInput formControlName="name" required>
          <mat-error *ngIf="recipeForm.get('name')?.hasError('required')">
            Recipe name is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Category</mat-label>
          <input matInput formControlName="category">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="3"></textarea>
        </mat-form-field>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Prep Time (minutes)</mat-label>
            <input matInput type="number" formControlName="prepTime">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Cook Time (minutes)</mat-label>
            <input matInput type="number" formControlName="cookTime">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Servings</mat-label>
            <input matInput type="number" formControlName="servings">
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Ingredients (one per line)</mat-label>
          <textarea matInput formControlName="ingredients" rows="8"></textarea>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Instructions</mat-label>
          <textarea matInput formControlName="instructions" rows="10"></textarea>
        </mat-form-field>

        <div class="file-upload">
          <label for="file-input">
            <button mat-raised-button type="button" (click)="fileInput.click()">
              <mat-icon>image</mat-icon>
              Upload Image
            </button>
          </label>
          <input #fileInput type="file" accept="image/*" (change)="onFileSelected($event)" style="display: none;">
          <span *ngIf="selectedFile" class="file-name">{{ selectedFile.name }}</span>
        </div>

        <div class="form-actions">
          <button mat-button type="button" (click)="onCancel()">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="recipeForm.invalid || loading">
            {{ isEditMode ? 'Update' : 'Create' }} Recipe
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
