<div class="app-container">
  <mat-toolbar color="primary" class="app-toolbar">
    <a class="app-title" routerLink="/recipes" aria-label="RecipeVault home">
      <img src="assets/logo/logo-lockup-nav-dark.svg"
           alt="RecipeVault"
           class="nav-logo" />
    </a>
    
    <span class="spacer"></span>
    
    @if (isAuthenticated()) {
      <!-- Desktop nav -->
      <div class="desktop-nav">
        <button mat-button routerLink="/recipes" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
          <mat-icon>restaurant_menu</mat-icon>
          Recipes
        </button>
        <button mat-button routerLink="/discover" routerLinkActive="active-link">
          <mat-icon>explore</mat-icon>
          Discover
        </button>
        <button mat-button routerLink="/ingredient-search" routerLinkActive="active-link">
          <mat-icon>search</mat-icon>
          By Ingredient
        </button>
        <button mat-button routerLink="/circles" routerLinkActive="active-link">
          <mat-icon>group</mat-icon>
          Circles
        </button>
        <button mat-button routerLink="/meal-plans" routerLinkActive="active-link">
          <mat-icon>calendar_month</mat-icon>
          Meal Plans
        </button>
        <button mat-button [matMenuTriggerFor]="moreMenu" class="more-menu-btn">
          <mat-icon>more_horiz</mat-icon>
          More
        </button>
        <mat-menu #moreMenu="matMenu">
          <button mat-menu-item routerLink="/dietary-profiles">
            <mat-icon>person</mat-icon>
            <span>Dietary Profiles</span>
          </button>
          <button mat-menu-item routerLink="/cooking-history">
            <mat-icon>history</mat-icon>
            <span>Cooking Log</span>
          </button>
          <button mat-menu-item routerLink="/cooking-stats">
            <mat-icon>bar_chart</mat-icon>
            <span>Stats</span>
          </button>
          <button mat-menu-item routerLink="/equipment">
            <mat-icon>kitchen</mat-icon>
            <span>Equipment</span>
          </button>
          <button mat-menu-item routerLink="/collections">
            <mat-icon>menu_book</mat-icon>
            <span>Collections</span>
          </button>
          <mat-divider></mat-divider>
          <button mat-menu-item routerLink="/settings">
            <mat-icon>settings</mat-icon>
            <span>Settings</span>
          </button>
        </mat-menu>
      </div>

      <!-- Mobile nav (hamburger) -->
      <button mat-icon-button [matMenuTriggerFor]="mobileMenu" class="mobile-nav-btn">
        <mat-icon>menu</mat-icon>
      </button>
      <mat-menu #mobileMenu="matMenu">
        <button mat-menu-item routerLink="/recipes">
          <mat-icon>restaurant_menu</mat-icon>
          <span>Recipes</span>
        </button>
        <button mat-menu-item routerLink="/discover">
          <mat-icon>explore</mat-icon>
          <span>Discover</span>
        </button>
        <button mat-menu-item routerLink="/ingredient-search">
          <mat-icon>search</mat-icon>
          <span>By Ingredient</span>
        </button>
        <button mat-menu-item routerLink="/circles">
          <mat-icon>group</mat-icon>
          <span>Circles</span>
        </button>
        <button mat-menu-item routerLink="/meal-plans">
          <mat-icon>calendar_month</mat-icon>
          <span>Meal Plans</span>
        </button>
        <button mat-menu-item routerLink="/dietary-profiles">
          <mat-icon>person</mat-icon>
          <span>Dietary Profiles</span>
        </button>
        <button mat-menu-item routerLink="/cooking-history">
          <mat-icon>history</mat-icon>
          <span>Cooking Log</span>
        </button>
        <button mat-menu-item routerLink="/cooking-stats">
          <mat-icon>bar_chart</mat-icon>
          <span>Stats</span>
        </button>
        <button mat-menu-item routerLink="/equipment">
          <mat-icon>kitchen</mat-icon>
          <span>Equipment</span>
        </button>
        <button mat-menu-item routerLink="/collections">
          <mat-icon>menu_book</mat-icon>
          <span>Collections</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item routerLink="/settings">
          <mat-icon>settings</mat-icon>
          <span>Settings</span>
        </button>
      </mat-menu>

      <button mat-icon-button [matMenuTriggerFor]="userMenu">
        <mat-icon>account_circle</mat-icon>
      </button>
      
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item disabled>
          <mat-icon>person</mat-icon>
          <span>{{ userEmail() }}</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    }
  </mat-toolbar>

  <app-upgrade-banner></app-upgrade-banner>

  <!-- PWA install prompt (inline, not fixed, so it doesn't cover content) -->
  <app-install-prompt></app-install-prompt>

  <div class="app-content">
    <router-outlet></router-outlet>
  </div>

  <!-- Bug report button (only shown when Sentry is enabled) -->
  <app-feedback-button></app-feedback-button>

  <!-- Tour tooltip overlay -->
  <app-tour-tooltip></app-tour-tooltip>
</div>
