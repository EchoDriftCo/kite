name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  FLY_APP: recipevault-morning-dawn-6796
  DOTNET_VERSION: '8.0.x'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: |
          dotnet test src/RecipeVault.Domain.Tests --configuration Release --no-build --verbosity normal
          dotnet test src/RecipeVault.DomainService.Tests --configuration Release --no-build --verbosity normal
          dotnet test src/RecipeVault.Facade.Tests --configuration Release --no-build --verbosity normal
          dotnet test src/RecipeVault.WebApi.Tests --configuration Release --no-build --verbosity normal
          dotnet test src/RecipeVault.WebApi.IntegrationTests --configuration Release --no-build --verbosity normal
          dotnet test src/RecipeVault.Integrations.Gemini.Tests --configuration Release --no-build --verbosity normal

      - name: Generate migration SQL
        id: migrations
        run: |
          cd src/RecipeVault.Data
          
          # Generate idempotent migration script
          dotnet ef migrations script \
            --idempotent \
            --startup-project ../RecipeVault.WebApi \
            --output ../../migrations.sql
          
          # Check if there are actual migrations to run
          if grep -q "INSERT INTO.*__EFMigrationsHistory" ../../migrations.sql; then
            echo "has_migrations=true" >> $GITHUB_OUTPUT
            echo "::notice::Pending migrations found"
          else
            echo "has_migrations=false" >> $GITHUB_OUTPUT
            echo "::notice::No pending migrations"
          fi

      - name: Apply migrations to Supabase
        if: steps.migrations.outputs.has_migrations == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Applying migrations to Supabase..."
          
          # Install psql
          sudo apt-get update && sudo apt-get install -y postgresql-client
          
          # Debug: check if URL is set (don't print the actual value)
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "❌ SUPABASE_DB_URL is not set!"
            exit 1
          fi
          echo "✓ SUPABASE_DB_URL is set"
          
          # Extract host from URL and resolve to IPv4 using dig
          DB_HOST=$(echo "$SUPABASE_DB_URL" | sed -n 's|.*@\([^:/]*\).*|\1|p')
          echo "Resolving $DB_HOST to IPv4..."
          IPV4=$(dig +short A "$DB_HOST" | head -1)
          
          if [ -z "$IPV4" ]; then
            echo "⚠️ Could not resolve IPv4, trying direct connection..."
            FINAL_URL="${SUPABASE_DB_URL}?sslmode=require"
          else
            echo "Using IPv4: $IPV4"
            FINAL_URL=$(echo "$SUPABASE_DB_URL" | sed "s|@${DB_HOST}:|@${IPV4}:|")"?sslmode=require"
          fi
          
          # Run migrations with timeout and SSL
          # Using direct connection (not pooler) for DDL operations
          psql "$FINAL_URL" \
            -v ON_ERROR_STOP=1 \
            --set=statement_timeout=60000 \
            -f migrations.sql
          
          echo "✅ Migrations applied successfully"

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Fly Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 10
          
          # Health check
          response=$(curl -s -o /dev/null -w "%{http_code}" https://myrecipevault.io/api/health)
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with status $response"
            exit 1
          fi

      - name: Notify success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -s -H "Content-Type: application/json" \
              -d "{\"content\":\"✅ **RecipeVault deployed successfully**\nCommit: \`${GITHUB_SHA::7}\` — ${GITHUB_EVENT_HEAD_COMMIT_MESSAGE:-$(git log -1 --pretty=%s)}\nHealth check passed.\"}" \
              "$DISCORD_WEBHOOK"
          fi

      - name: Notify failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -s -H "Content-Type: application/json" \
              -d "{\"content\":\"🔴 **RecipeVault deploy FAILED**\nCommit: \`${GITHUB_SHA::7}\`\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nCheck the logs ^^^\"}" \
              "$DISCORD_WEBHOOK"
          fi
