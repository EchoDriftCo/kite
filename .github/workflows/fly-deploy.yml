# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git describe (version tags)
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Set build metadata
        run: |
          # Get version from git describe, strip 'v' prefix, convert to valid semver
          RAW_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo '1.0.0-dev')
          # v1.0.0 -> 1.0.0
          # v1.0.0-4-g63246c0 -> 1.0.0-dev.4 (NuGet-compatible prerelease)
          VERSION=$(echo "$RAW_VERSION" | sed 's/^v//' | sed 's/-\([0-9]*\)-g[a-f0-9]*$/-dev.\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "GIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --build-arg VERSION=${{ env.VERSION }} --build-arg GIT_SHA=${{ env.GIT_SHA }} --build-arg BUILD_TIMESTAMP=${{ env.BUILD_TIMESTAMP }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
