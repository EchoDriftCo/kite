name: E2E Tests

on:
  workflow_dispatch:  # Manual trigger only - E2E needs full stack (Angular + backend + Supabase)
  # TODO: Re-enable on push/PR when CI has docker-compose standing up the full stack
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json
        
    - name: Install dependencies
      working-directory: ui
      run: npm ci --legacy-peer-deps
      
    - name: Install Playwright Browsers
      working-directory: ui
      run: npx playwright install --with-deps
      
    - name: Build Angular app
      working-directory: ui
      run: npm run build
      env:
        NODE_ENV: production
        
    - name: Run Playwright tests
      working-directory: ui
      run: npm run test:e2e
      env:
        CI: true
        BASE_URL: http://localhost:4200
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: ui/playwright-report/
        retention-days: 30
        
    - name: Upload test screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-screenshots
        path: ui/test-results/
        retention-days: 30
        
    - name: Upload visual snapshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: visual-snapshots
        path: ui/e2e/snapshots/
        retention-days: 30
